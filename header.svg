<svg width="860" height="220" viewBox="0 0 860 220" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%"   stop-color="#3d2518"/>
      <stop offset="100%" stop-color="#6b4535"/>
    </linearGradient>
    <linearGradient id="arc-grad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%"   stop-color="#c4a882" stop-opacity="0.25"/>
      <stop offset="100%" stop-color="#8b6355" stop-opacity="0.05"/>
    </linearGradient>
    <linearGradient id="line-grad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%"   stop-color="#c4a882" stop-opacity="0"/>
      <stop offset="30%"  stop-color="#c4a882" stop-opacity="1"/>
      <stop offset="70%"  stop-color="#c4a882" stop-opacity="1"/>
      <stop offset="100%" stop-color="#c4a882" stop-opacity="0"/>
    </linearGradient>
  </defs>

  <!-- Background -->
  <rect width="860" height="220" rx="18" fill="url(#bg)"/>

  <!-- Arch left -->
  <ellipse cx="140" cy="0" rx="200" ry="240" fill="url(#arc-grad)"/>
  <!-- Arch right -->
  <ellipse cx="720" cy="220" rx="220" ry="200" fill="url(#arc-grad)"/>

  <!-- Decorative circle top-left -->
  <circle cx="60" cy="60" r="80" fill="none" stroke="#c4a882" stroke-width="0.6" opacity="0.3"/>
  <circle cx="60" cy="60" r="50" fill="none" stroke="#c4a882" stroke-width="0.4" opacity="0.2"/>

  <!-- Decorative circle bottom-right -->
  <circle cx="800" cy="170" r="90" fill="none" stroke="#c4a882" stroke-width="0.6" opacity="0.25"/>

  <!-- Top label -->
  <text x="430" y="52" font-family="Georgia, 'Times New Roman', serif" font-size="11"
        fill="#c4a882" text-anchor="middle" letter-spacing="5" opacity="0.9">— PORTFOLIO DÉVELOPPEUR —</text>

  <!-- Main name -->
  <text x="430" y="112" font-family="Georgia, 'Times New Roman', serif" font-size="52"
        font-weight="300" fill="#f5f0e8" text-anchor="middle" letter-spacing="3">Louis BERTRAND</text>

  <!-- Decorative line under name -->
  <rect x="215" y="124" width="430" height="1" fill="url(#line-grad)"/>

  <!-- Subtitle -->
  <text x="430" y="153" font-family="Arial, Helvetica, sans-serif" font-size="13.5"
        fill="#c4a882" text-anchor="middle" letter-spacing="4" font-weight="300">TECHNICIEN SYSTÈMES &amp; RÉSEAUX</text>

  <!-- Tags -->
  <text x="430" y="185" font-family="Arial, Helvetica, sans-serif" font-size="11"
        fill="#e8d9c8" text-anchor="middle" letter-spacing="2" opacity="0.75">BTS SIO  ·  SISR  ·  INFRASTRUCTURE  ·  CYBERSÉCURITÉ</text>

  <!-- Small decorative dots -->
  <circle cx="325" cy="183" r="2" fill="#c4a882" opacity="0.5"/>
  <circle cx="535" cy="183" r="2" fill="#c4a882" opacity="0.5"/>
</svg>
